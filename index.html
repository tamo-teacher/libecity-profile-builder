<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リベシティ プロフィールビルダー🦁</title>
  <style>
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --primary-light: #fff7ed;
      --secondary: #fbbf24;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: #e7e5e4;
      --bg: #fafaf9;
      --success: #22c55e;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .app-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(249,115,22,0.3);
    }
    .app-header h1 { font-size: 18px; font-weight: 700; }
    .app-header .subtitle { font-size: 12px; opacity: 0.9; }

    /* PROGRESS */
    .progress-wrap {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      position: sticky;
      top: 58px;
      z-index: 99;
    }
    .progress-bar-bg { background: var(--border); border-radius: 99px; height: 6px; }
    .progress-bar-fill {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 99px; height: 6px;
      transition: width 0.4s ease;
    }
    .progress-text { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: var(--text-muted); }
    .step-dots { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      background: var(--border); color: var(--text-muted);
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .step-dot.active { background: var(--primary); color: white; }
    .step-dot.done { background: var(--success); color: white; }

    /* MAIN LAYOUT */
    .main-layout { display: flex; max-width: 1100px; margin: 0 auto; }
    .form-panel { flex: 1; padding: 28px 24px; min-width: 0; }

    /* STEP CARD */
    .step-card {
      background: white; border-radius: var(--radius);
      padding: 28px; box-shadow: var(--shadow);
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .step-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--primary-light); color: var(--primary-dark);
      border-radius: 99px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; margin-bottom: 10px;
    }
    .step-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .step-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
    .tip-box {
      background: var(--primary-light); border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0; padding: 12px 16px;
      margin-bottom: 24px; font-size: 13px; color: var(--primary-dark); line-height: 1.7;
    }
    .tip-box strong { display: block; margin-bottom: 4px; font-size: 12px; }

    /* FIELDS */
    .field-group { margin-bottom: 18px; }
    .field-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .field-optional { color: var(--text-muted); font-size: 11px; font-weight: normal; }
    input[type="text"], textarea, select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      color: var(--text); background: white; transition: border-color 0.2s; resize: vertical;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }
    textarea { line-height: 1.7; }
    .char-count { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* BUTTONS */
    .nav-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 12px; }
    .btn {
      padding: 12px 28px; border-radius: 8px; font-size: 15px;
      font-weight: 600; border: none; cursor: pointer;
      transition: all 0.2s; font-family: inherit; white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(249,115,22,0.4); }
    .btn-secondary { background: white; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-full { width: 100%; }

    /* PREVIEW PANEL */
    .preview-panel { width: 340px; flex-shrink: 0; padding: 28px 24px 28px 0; }
    .preview-sticky { position: sticky; top: 140px; max-height: calc(100vh - 150px); overflow-y: auto; }
    .preview-card {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
    }
    .preview-header { background: #1c1917; padding: 12px 16px; color: white; font-size: 13px; font-weight: 600; }
    .preview-sections { padding: 14px; }
    .preview-section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .preview-section:last-child { border-bottom: none; margin-bottom: 0; }
    .preview-section-title { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .preview-text { font-size: 12px; line-height: 1.7; white-space: pre-wrap; }
    .preview-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* WELCOME */
    .welcome-hero { text-align: center; margin-bottom: 28px; }
    .welcome-hero .lion { font-size: 56px; margin-bottom: 12px; }
    .welcome-hero h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
    .welcome-hero p { font-size: 15px; color: var(--text-muted); line-height: 1.7; }
    .welcome-options { display: flex; flex-direction: column; gap: 14px; }
    .welcome-option {
      background: white; border: 2px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .welcome-option:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .welcome-option.featured { border-color: var(--primary); background: var(--primary-light); }
    .welcome-option h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .welcome-option p { font-size: 13px; color: var(--text-muted); }
    .paste-area { margin-top: 14px; }
    .paste-area textarea { min-height: 160px; font-size: 13px; }

    /* FINAL */
    .output-section {
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); margin-bottom: 14px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .output-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #f5f5f4; border-bottom: 1px solid var(--border);
    }
    .output-title { font-size: 14px; font-weight: 700; }
    .btn-copy {
      background: var(--primary); color: white; border: none;
      border-radius: 6px; padding: 6px 14px; font-size: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-copy:hover { background: var(--primary-dark); }
    .btn-copy.copied { background: var(--success); }
    .output-text { padding: 14px 16px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
    .output-empty { padding: 14px 16px; font-size: 13px; color: var(--text-muted); font-style: italic; }
    .final-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

    .hidden { display: none !important; }

    @media (max-width: 800px) {
      .preview-panel { display: none; }
    }
  </style>
</head>

// ====== GENERATE PROFILE ======
function generateProfile() {
  const d = data;
  return {
    '自己紹介': genIntro(d),
    'リベ大との出会い': genEncounter(d),
    '挑戦・実践していること': genChallenge(d),
    '趣味・特技': genHobbies(d),
    '好きな〇〇': genFavorites(d),
    'イチオシのリベ大コンテンツ': genContent(d),
    'その他ご自由にどうぞ': genOther(d),
  };
}

function genIntro(d) {
  const p = [];
  if (d.goal) p.push('🎯 ' + d.goal);
  if (d.currentWork) p.push('\n📌 今やっていること\n' + d.currentWork);
  if (d.challenges) p.push('\n💭 悩み・課題\n' + d.challenges);
  if (d.libecityGoal) p.push('\n🤝 リベシティでやりたいこと\n' + d.libecityGoal);
  return p.join('\n');
}
function genEncounter(d) {
  const p = [];
  if (d.encounterTrigger) p.push(d.encounterTrigger);
  if (d.whyJoined) p.push(d.whyJoined);
  return p.join('\n\n');
}
function genChallenge(d) {
  const p = [];
  if (d.saving) p.push('💰 貯める力\n' + d.saving);
  if (d.investing) p.push('📈 増やす力\n' + d.investing);
  if (d.earning) p.push('💪 稼ぐ力\n' + d.earning);
  if (d.futureGoals) p.push('🌟 これからやりたいこと\n' + d.futureGoals);
  return p.join('\n\n');
}
function genHobbies(d) {
  const p = [];
  if (d.hobbies) p.push('趣味：' + d.hobbies);
  if (d.skills) p.push('特技：' + d.skills);
  return p.join('\n');
}
function genFavorites(d) {
  const p = [];
  if (d.fav1Item) {
    let s = '好きな' + (d.fav1Type || '好きなもの') + '：' + d.fav1Item;
    if (d.fav1Why) s += '\n（' + d.fav1Why + '）';
    p.push(s);
  }
  if (d.fav2Item && d.fav2Type && d.fav2Type !== '選択なし') {
    let s = '好きな' + d.fav2Type + '：' + d.fav2Item;
    if (d.fav2Why) s += '\n（' + d.fav2Why + '）';
    p.push(s);
  }
  return p.join('\n\n');
}
function genContent(d) {
  const p = [];
  if (d.favContent) p.push('🎬 ' + d.favContent);
  if (d.whyContent) p.push(d.whyContent);
  return p.join('\n\n');
}
function genOther(d) {
  const p = [];
  if (d.nameOrigin) p.push('【リベネームの由来】\n' + d.nameOrigin);
  if (d.iconOrigin) p.push('【アイコンの由来】\n' + d.iconOrigin);
  if (d.strengthFinder) p.push('【ストレングスファインダー】\n' + d.strengthFinder);
  if (d.connectWith) p.push('【こんな人と友達になりたい！】\n' + d.connectWith);
  if (d.favoriteChat) p.push('【よくいるチャット】\n' + d.favoriteChat);
  if (d.otherMessage) p.push(d.otherMessage);
  return p.join('\n\n');
}

// リベシティからのデータをアプリのフィールドにマッピング
function mapLibecityData(raw) {
  const d = {};
  // Libecityのtextarea順番（edit_profile_detailページ）：
  // t0: 自己紹介  t1: リベ大との出会い  t2: 挑戦・実践  t3: 趣味・特技
  // t4: 好きな〇〇（1つ目）  t5: その他ご自由に
  if (raw.t0) d.currentWork = raw.t0;          // 自己紹介 → 今やっていること欄へ
  if (raw.t1) d.encounterTrigger = raw.t1;     // リベ大との出会い
  if (raw.t2) {
    // 挑戦・実践は長いので稼ぐ力欄へ（ユーザーが各力に振り分けられる）
    d.earning = raw.t2;
  }
  if (raw.t3) d.hobbies = raw.t3;             // 趣味・特技
  if (raw.t4) d.fav1Item = raw.t4;            // 好きな〇〇
  if (raw.t5) d.otherMessage = raw.t5;        // その他ご自由に
  // input fields: i0=出身地, i1=家族構成（現在のフィールドには対応なし）
  return d;
}

function launchWizard() {
  currentStep = 0;
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('previewPanel').classList.remove('hidden');
  document.getElementById('mainLayout').style.cssText = 'max-width:1100px;margin:0 auto;display:flex';
  renderStep(); renderPreview(); updateDots();
}

// ====== WIZARD ======
function renderStep() {
  const s = steps[currentStep];
  const pct = Math.round((currentStep / steps.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'ステップ ' + (currentStep + 1) + ' / ' + steps.length;
  document.getElementById('progressPct').textContent = pct + '%';
  updateDots();

  const fieldsHtml = s.fields.map(f => {
    const val = data[f.key] !== undefined ? data[f.key] : '';
    const opt = f.optional ? '<span class="field-optional">（任意）</span>' : '';
    const key = f.key;
    if (f.type === 'textarea') {
      const h = (f.rows || 3) * 28;
      return '<div class="field-group">' +
        (f.label ? '<label class="field-label">' + f.label + ' ' + opt + '</label>' : '') +
        '<textarea id="field_' + key + '" style="min-height:' + h + 'px" placeholder="' + escAttr(f.placeholder || '') + '" oninput="onInput(\'' + key + '\',this.value)">' + escHtml(val) + '</textarea>' +
        '<div class="char-count" id="cc_' + key + '">' + val.length + '文字</div>' +
        '</div>';
    }
    if (f.type === 'text') {
      return '<div class="field-group">' +
        (f.label ? '<label class="field-label">' + f.label + ' ' + opt + '</label>' : '') +
        '<input type="text" id="field_' + key + '" value="' + escAttr(val) + '" placeholder="' + escAttr(f.placeholder || '') + '" oninput="onInput(\'' + key + '\',this.value)">' +
        '</div>';
    }
    if (f.type === 'select') {
      const opts = f.options.map(o => '<option value="' + escAttr(o) + '"' + (val === o ? ' selected' : '') + '>' + escHtml(o) + '</option>').join('');
      return '<div class="field-group">' +
        (f.label ? '<label class="field-label">' + f.label + ' ' + opt + '</label>' : '') +
        '<select id="field_' + key + '" onchange="onInput(\'' + key + '\',this.value)">' + opts + '</select>' +
        '</div>';
    }
    return '';
  }).join('');

  const isLast = currentStep === steps.length - 1;
  document.getElementById('formPanel').innerHTML =
    '<div class="step-card">' +
    '<div class="step-badge">' + s.badge + ' ' + s.emoji + '</div>' +
    '<h2 class="step-title">' + s.emoji + ' ' + s.title + '</h2>' +
    '<p class="step-desc">' + escHtml(s.desc) + '</p>' +
    '<div class="tip-box"><strong>📚 ノウハウ図書館より</strong>' + escHtml(s.tip) + '</div>' +
    fieldsHtml +
    '<div class="nav-buttons">' +
    (currentStep > 0
      ? '<button class="btn btn-secondary" onclick="goPrev()">← 戻る</button>'
      : '<button class="btn btn-secondary" onclick="saveFields();renderWelcome()">← トップに戻る</button>'
    ) +
    '<button class="btn btn-primary" onclick="goNext()">' + (isLast ? '🎉 プロフィールを完成させる！' : '次へ →') + '</button>' +
    '</div>' +
    '</div>';
  window.scrollTo(0, 0);
}

function onInput(key, value) {
  data[key] = value;
  const cc = document.getElementById('cc_' + key);
  if (cc) cc.textContent = value.length + '文字';
  renderPreview();
}

function saveFields() {
  if (currentStep < 0 || currentStep >= steps.length) return;
  steps[currentStep].fields.forEach(f => {
    const el = document.getElementById('field_' + f.key);
    if (el) data[f.key] = el.value;
  });
}

function goNext() { saveFields(); if (currentStep >= steps.length - 1) { renderFinal(); } else { currentStep++; renderStep(); renderPreview(); } }
function goPrev() { saveFields(); if (currentStep > 0) { currentStep--; renderStep(); renderPreview(); } }
function jumpTo(i) { saveFields(); currentStep = i; if (i >= steps.length) { renderFinal(); } else { renderStep(); renderPreview(); } }

function updateDots() {
  const el = document.getElementById('stepDots');
  if (!el) return;
  el.innerHTML = steps.map((s, i) => {
    const cls = i < currentStep ? 'done' : (i === currentStep ? 'active' : '');
    return '<div class="step-dot ' + cls + '" onclick="jumpTo(' + i + ')" title="' + s.title + '">' + (i < currentStep ? '✓' : i + 1) + '</div>';
  }).join('') + '<div class="step-dot ' + (currentStep >= steps.length ? 'active' : '') + '" onclick="jumpTo(' + steps.length + ')" title="完成🎉">🎉</div>';
}

  const el = document.getElementById('previewContent');

function doCopy(btnId, text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = '✅ コピー済み！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2500);
  });
}

function copyAll() {
  const sections = generateProfile();
  const all = Object.entries(sections).filter(([,t]) => t.trim()).map(([title, t]) => '【' + title + '】\n' + t).join('\n\n---\n\n');
  navigator.clipboard.writeText(all).then(() => alert('プロフィール全文をコピーしました！\nリベシティのプロフィール編集ページに貼り付けてください。'));
}

  currentStep = steps.length - 1;

  document.getElementById('previewPanel').classList.remove('hidden');
  document.getElementById('mainLayout').style.cssText = 'max-width:1100px;margin:0 auto;display:flex';

function resetAll() {
  if (confirm('最初からやり直しますか？\n入力内容は消えます。')) { currentStep = -1; data = {}; renderWelcome(); }

// ====== UTILS ======
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function escAttr(s) { return String(s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ====== INIT ======
(function() {
  // URLパラメータにlibecity_importがあれば自動取り込み
  const params = new URLSearchParams(window.location.search);

    try {
      const raw = JSON.parse(decodeURIComponent(atob(importParam)));

      renderImportSuccess(raw);
      return;

})();

    '<li style="padding:4px 0">✅ ' + f.label + '（' + raw[f.key].length + '文字）</li>'
  ).join('');

  document.getElementById('formPanel').innerHTML = `
    <div style="padding:20px 0;text-align:center">
      <div style="font-size:56px;margin-bottom:12px">📥</div>
      <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">取り込み完了！</h2>
      <p style="color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:20px">
        リベシティの既存プロフィールを読み込みました。<br>
        各ステップで内容を確認・編集しながら進めましょう！
      </p>
      <div style="background:white;border-radius:var(--radius);border:1px solid var(--border);padding:16px;text-align:left;margin-bottom:24px">
        <p style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--primary)">📋 取り込んだセクション</p>
        <ul style="list-style:none;font-size:13px;color:var(--text)">
          ${importedItems || '<li style="color:var(--text-muted)">データが見つかりませんでした</li>'}
        </ul>
        <p style="font-size:12px;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          💡 取り込んだ内容は各ステップで編集できます。<br>セクションをまたぐ内容は手動で振り分けてください。
        </p>
      </div>
      <button class="btn btn-primary btn-full" onclick="launchWizard()" style="font-size:16px;padding:14px">
        🚀 ブラッシュアップを始める！
      </button>
      <button class="btn btn-secondary btn-full" onclick="renderWelcome()" style="margin-top:10px;font-size:14px">
        ← トップに戻る
      </button>
    </div>
  `;
}
</script>
</body>
</html>
